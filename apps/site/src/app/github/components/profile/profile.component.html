<ng-container *ngIf="user">
  <div class="profile">
    <div class="profile-wrapper">
      <div class="profile-header">
        <div class="profile-names">
          <h1>{{ user.name }}</h1>
          <a
            class="handle"
            [href]="user.html_url"
            rel="noopener noreferrer"
            target="_blank"
            >@{{ user.login }}</a
          >
        </div>
        <div class="avatar-image">
          <img [src]="user.avatar_url" [alt]="user.name" />
        </div>
      </div>
      <div class="profile-info">
        <div class="bio">
          {{ user.bio }}
        </div>
        <div class="info-basics">
          <div class="work basic-info-item">
            <fa-icon [icon]="icons.faBriefcase"></fa-icon>
            {{ user.company }}
          </div>
          <div class="location basic-info-item">
            <fa-icon [icon]="icons.faMapMarkerAlt"></fa-icon>
            {{ user.location }}
          </div>
          <div class="joined basic-info-item">
            <fa-icon [icon]="icons.faCalendarAlt"></fa-icon>
            Joined {{ user.created_at | date }}
          </div>
          <div class="repositories basic-info-item">
            <fa-icon [icon]="icons.faFolder"></fa-icon>
            {{ user.public_repos }} Repositories
          </div>
        </div>
      </div>
    </div>
  </div>
</ng-container>
