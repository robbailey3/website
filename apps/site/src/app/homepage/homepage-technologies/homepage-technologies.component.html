<section>
  <div class="homepage-technologies-container">
    <ng-container *ngFor="let item of technologies; let i = index">
      <div class="w-full md:w-1/3 p-4">
        <rob-technology-item
          [item]="item"
          [animationDelay]="i * 100"
        ></rob-technology-item>
      </div>
    </ng-container>
  </div>
  <div class="text-center py-12">
    <rob-button [routerLink]="['/cv', 'skills']" variant="primary" size="xl"
      >See more</rob-button
    >
  </div>
</section>
