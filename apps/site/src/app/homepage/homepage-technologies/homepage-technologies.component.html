<section>
  <div class="container mx-auto max-w-5xl flex flex-wrap p-16">
    <ng-container *ngFor="let item of technologies">
      <div class="item-wrapper w-full md:w-1/2 lg:w-1/3">
        <rob-card class="m-2 block">
          <img [src]="item.logoSrc" [alt]="item.name + ' logo'" />
          <span class="tech-name">{{ item.name }}</span>
          <span class="tech-description">{{ item.description }}</span>
        </rob-card>
      </div>
    </ng-container>
  </div>
</section>
