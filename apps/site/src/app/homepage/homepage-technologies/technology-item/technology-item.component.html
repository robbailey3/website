<div
  class="item-wrapper"
  robIntersectionObserver
  (isInViewport)="viewPortListener()"
  [ngClass]="{ 'is-visible': hasEnteredScreen }"
>
  <rob-card class="technology-item">
    <img [src]="item.logoSrc" [alt]="item.name + ' logo'" />
    <h3 class="tech-name">{{ item.name }}</h3>
    <span class="tech-description">{{ item.description }}</span>
  </rob-card>
</div>
