<ng-container *ngIf="isMobile">
  <rob-button [icon]="faBars" (buttonClick)="handleNavButtonClick()"
    ><span class="sr-only">Toggle Navigation</span></rob-button
  >
</ng-container>
<nav class="navigation" [ngClass]="{ expanded: state === 'open' && isMobile }">
  <ul class="nav-list">
    <ng-container *ngIf="!isLoggedIn; else adminRoutes">
      <li class="nav-list-item">
        <a [routerLink]="['/']" class="nav-list-item-link">Home</a>
      </li>
      <li class="nav-list-item">
        <a [routerLink]="['/about']" class="nav-list-item-link">About</a>
      </li>
      <li class="nav-list-item">
        <a [routerLink]="['/projects']" class="nav-list-item-link">Projects</a>
      </li>
      <li class="nav-list-item">
        <a [routerLink]="['/github']" class="nav-list-item-link">GitHub</a>
      </li>
      <li class="nav-list-item">
        <a [routerLink]="['/cv']" class="nav-list-item-link">CV</a>
      </li>
    </ng-container>
    <ng-template #adminRoutes>
      <li class="nav-list-item">
        <a [routerLink]="['/admin']" class="nav-list-item-link">Dashboard</a>
      </li>
      <li class="nav-list-item">
        <a [routerLink]="['/admin/dev-diary']" class="nav-list-item-link"
          >Dev Diary</a
        >
      </li>
      <li class="nav-list-item">
        <a (click)="logout()" class="nav-list-item-link">Logout</a>
      </li>
    </ng-template>
  </ul>
</nav>
