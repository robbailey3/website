<div class="timeline">
  <div class="timeline-wrapper">
    <div class="timeline" #timelineInner>
      <span class="end-year">{{ endYear }}</span>
      <div class="timeline-items">
        <ng-container *ngFor="let timelineItem of timeline">
          <rob-timeline-item [timelineItem]="timelineItem"></rob-timeline-item>
        </ng-container>
      </div>
      <span class="start-year">{{ startYear }}</span>
    </div>
  </div>
</div>
