<span class="chip" [title]="title" [ngClass]="chipClass">
  <span
    class="chip-content"
    [ngClass]="{
      'mr-2': dismissable
    }"
  >
    <ng-content></ng-content>
  </span>
  <rob-button
    variant="ghost"
    size="xs"
    [icon]="faTimes"
    *ngIf="dismissable"
  ></rob-button>
</span>
